<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Create Account — Orvixa</title><link rel="stylesheet" href="styles.css"/></head>
<body class="auth">
  <div class="auth-card glass">
    <a class="brand center" href="index.html"><span class="logo">▶</span><span>ORVIXA</span></a>
    <h1>Create your account</h1>
    <p>Start building with Orvixa today.</p>
    <label>Name</label><input id="name" placeholder="Your name"/>
    <label>Email</label><input id="email" placeholder="you@email.com"/>
    <label>Password</label><input id="password" type="password" placeholder="Create a password"/>
    <button class="btn full" onclick="demoSignup()">Create Account</button>
    <p class="center small">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
